<div class="card border-dark mb-3 mt-3">
  <div class="card-header">
    <div class="row align-items-end">
      <div class="col"><h5>Clientes</h5></div>
      <div class="col text-end">
        <a routerLink="/clientes/nuevo" class="btn btn-primary">Nuevo</a>
      </div>
    </div>
  </div>
  <div class="card-body text-dark">
    <h5 class="card-title">Listado de clientes</h5>

    <!-- Tabla con listado de clientes -->

    <div class="table-responsive">
      <table
        class="table table-striped"
        *ngIf="clientes.length > 0; else elseBlock"
      >
        <thead class="table-dark">
          <tr>
            <th scope="col">#</th>
            <th scope="col">Nombre</th>
            <th scope="col">Apellido</th>
            <th scope="col">Email</th>
            <th scope="col">Creado</th>
            <th scope="col" class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of clientes; let i = index">
            <th scope="row">{{ i + 1 }}</th>
            <td>{{ item.nombre }}</td>
            <td>{{ item.apellido }}</td>
            <td>{{ item.email }}</td>
            <td>{{ item.createAt | date: "YYYY-MM-dd" }}</td>
            <td class="text-center">
              <div class="row">
                <div class="col">
                  <a
                    [routerLink]="['/clientes/editar', item.id]"
                    class="btn btn-success"
                    title="Editar registro"
                    ><i class="fa-solid fa-pencil"></i
                  ></a>
                </div>
                <div class="col">
                  <a
                    (click)="deleteCustomer(item.id, i)"
                    class="btn btn-danger"
                    title="Eliminar registro"
                    ><i class="fa-solid fa-trash"></i
                  ></a>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Si no hay clientes -->

      <ng-template #elseBlock>
        <div class="alert alert-warning" role="alert">
          <h4 class="alert-heading"><strong>Aviso</strong></h4>
          NO se encontraron clientes registrados
        </div>
      </ng-template>
    </div>
  </div>
</div>
